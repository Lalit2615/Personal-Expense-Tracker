{% extends 'layout.html' %}
{% block content %}
<div class="row justify-content-center pt-5 mt-4">
    <div class="col-md-5">
        <div class="card shadow border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="fas fa-wallet fa-3x text-primary mb-3"></i>
                    <h3 class="fw-bold">Welcome Back</h3>
                    <p class="text-muted">Login to manage your personal expenses</p>
                </div>
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold mb-3 py-2">Login</button>
                    <div class="text-center text-muted">
                        Don't have an account? <a href="{{ url_for('register') }}" class="text-decoration-none fw-bold text-primary">Sign Up</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
