{% extends 'layout.html' %}
{% block content %}
<div class="row justify-content-center pt-4">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white border-bottom pt-4 px-4">
                <h4 class="mb-0 text-primary"><i class="fas fa-cog me-2"></i>Account Settings</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-4">
                        <label for="budget_limit" class="form-label fw-semibold">Custom Monthly Budget Limit</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="fas fa-rupee-sign"></i></span>
                            <input type="number" step="0.01" class="form-control" id="budget_limit" name="budget_limit" value="{{ current_user.budget_limit }}" required>
                        </div>
                        <div class="form-text mt-2"><i class="fas fa-info-circle"></i> We'll securely alert you on your dashboard if your active month's spending crosses this personalized limit.</div>
                    </div>
                    <hr class="mb-4">
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary py-2"><i class="fas fa-save me-1"></i> Update Settings</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
