{% extends 'layout.html' %}
{% block content %}
<div class="row justify-content-center pt-5 mt-4">
    <div class="col-md-5">
        <div class="card shadow border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="fas fa-user-plus fa-3x text-success mb-3"></i>
                    <h3 class="fw-bold">Create an Account</h3>
                    <p class="text-muted">Start tracking your expenses securely today</p>
                </div>
                <form method="POST" action="{{ url_for('register') }}">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Choose a username" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Create a strong password" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100 fw-bold mb-3 py-2">Register Now</button>
                    <div class="text-center text-muted">
                        Already have an account? <a href="{{ url_for('login') }}" class="text-decoration-none fw-bold text-success">Login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
