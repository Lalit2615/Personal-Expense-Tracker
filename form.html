{% extends 'layout.html' %}

{% block content %}
<div class="row justify-content-center pt-3">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white border-bottom pt-4 pb-3 px-4">
                <h4 class="mb-0 text-primary"><i class="fas {% if form_type == 'Add' %}fa-plus-circle{% else %}fa-edit{% endif %} me-2"></i>{{ form_type }} Expense</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label for="amount" class="form-label fw-semibold">Amount</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-rupee-sign"></i></span>
                            <input type="number" step="0.01" class="form-control" id="amount" name="amount" placeholder="0.00" value="{{ expense.amount if expense else '' }}" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="category" class="form-label fw-semibold">Category</label>
                        <select class="form-select" id="category" name="category" required>
                            <option value="">Select a category...</option>
                            {% set categories = ['Food', 'Travel', 'Bills', 'Entertainment', 'Shopping', 'Health', 'Education', 'Other'] %}
                            {% for cat in categories %}
                                <option value="{{ cat }}" 
                                    {% if expense and expense.category == cat %}selected{% endif %}>
                                    {{ cat }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="date" class="form-label fw-semibold">Date</label>
                        <input type="date" class="form-control" id="date" name="date" 
                               value="{{ expense.date.strftime('%Y-%m-%d') if expense else '' }}" required>
                    </div>
                    
                    <div class="mb-4">
                        <label for="description" class="form-label fw-semibold">Description <span class="text-muted fw-normal">(Optional)</span></label>
                        <textarea class="form-control" id="description" name="description" rows="3" placeholder="Add some context...">{{ expense.description if expense else '' }}</textarea>
                    </div>
                    
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{{ url_for('index') }}" class="btn btn-light px-4">Cancel</a>
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="fas fa-save me-1"></i> Save
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
